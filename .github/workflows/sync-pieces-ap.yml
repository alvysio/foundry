name: Sync Alvys Pieces to Activepieces

# Publishes the Alvys-owned pieces (alvys, alvys-intelligence) to an Activepieces
# instance using the official `sync-pieces` CLI (per
# https://www.activepieces.com/docs/build-pieces/misc/pieces-ci-cd).
#
# Required repository secrets:
#   - AP_API_KEY       Platform Admin API key from the target AP instance
#                      (Settings -> API Keys). Must have piece-publish permission.
#   - AP_INSTANCE_URL  Base URL of the target AP instance, e.g.
#                      https://cloud.activepieces.com  (no trailing slash, no /api)
#
# Triggers:
#   push to main with changes under the alvys piece dirs, or manual dispatch.
#   (Workflow dispatch lets you re-publish without code changes — useful when
#   rotating the API key or pointing at a new instance.)
#
# This workflow is independent of release-alvys-pieces.yml, which publishes to
# GitHub Packages for self-host consumers. Use the GitHub Packages workflow for
# npm-tarball consumers; use this one to upload directly into an AP instance.

on:
  push:
    branches: [main]
    paths:
      - 'packages/pieces/community/alvys/**'
      - 'packages/pieces/community/alvys-intelligence/**'
      - 'packages/pieces/community/alvys-voice/**'
      - 'packages/shared/**'
      - '.github/workflows/sync-pieces-ap.yml'
  workflow_dispatch:
    inputs:
      instance:
        description: 'Override target instance (leave blank to use AP_INSTANCE_URL secret)'
        required: false
        type: string

concurrency:
  group: sync-pieces-ap-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-

      - name: Install dependencies
        run: bun install --no-save

      - name: Resolve target instance URL
        id: target
        run: |
          INSTANCE="${{ inputs.instance }}"
          if [ -z "$INSTANCE" ]; then
            INSTANCE="${{ secrets.AP_INSTANCE_URL }}"
          fi
          if [ -z "$INSTANCE" ]; then
            echo "::error::Neither workflow_dispatch input nor AP_INSTANCE_URL secret is set"
            exit 1
          fi
          INSTANCE="${INSTANCE%/}"
          echo "instance=$INSTANCE" >> "$GITHUB_OUTPUT"
          echo "Target instance: $INSTANCE"

      # `bun run sync-pieces` scans packages/pieces/custom/ only.
      # Our pieces live under packages/pieces/community/, so we symlink them
      # in for the CI run. Symlinks are local to the runner; the repo is
      # never modified.
      - name: Stage Alvys pieces for sync
        run: |
          mkdir -p packages/pieces/custom
          ln -sfn "$(pwd)/packages/pieces/community/alvys" \
                  packages/pieces/custom/alvys
          ln -sfn "$(pwd)/packages/pieces/community/alvys-intelligence" \
                  packages/pieces/custom/alvys-intelligence
          ln -sfn "$(pwd)/packages/pieces/community/alvys-voice" \
                  packages/pieces/custom/alvys-voice
          ls -la packages/pieces/custom/

      - name: Sync Alvys pieces to Activepieces
        env:
          AP_API_KEY: ${{ secrets.AP_API_KEY }}
        run: |
          bun run sync-pieces -- \
            --apiUrl "${{ steps.target.outputs.instance }}/api" \
            --pieces alvys alvys-intelligence alvys-voice \
            --fail-on-error

      - name: Summary
        if: always()
        run: |
          {
            echo "## Sync Alvys Pieces -> Activepieces"
            echo ""
            echo "- instance: \`${{ steps.target.outputs.instance }}\`"
            echo "- pieces:   \`alvys\`, \`alvys-intelligence\`, \`alvys-voice\`"
            echo "- versions read from each piece's \`package.json\`."
            echo ""
            echo "AP only ingests versions it hasn't seen before — if a piece"
            echo "didn't upload, bump its patch version in \`package.json\` and"
            echo "re-run."
          } >> "$GITHUB_STEP_SUMMARY"
